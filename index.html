<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yang Lintao Project - 视频拼接工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 2rem 0 0.5rem;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: #9ca3af;
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  .container {
    width: 100%;
    max-width: 960px;
    padding: 0 1.5rem 3rem;
  }

  /* Upload area */
  .upload-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .upload-card {
    background: rgba(255,255,255,0.06);
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s;
    position: relative;
  }

  .upload-card:hover, .upload-card.dragover {
    border-color: #a78bfa;
    background: rgba(167,139,250,0.08);
  }

  .upload-card.has-file {
    border-style: solid;
    border-color: #60a5fa;
    padding: 1rem;
  }

  .upload-card input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .upload-label {
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .upload-hint {
    font-size: 0.8rem;
    color: #9ca3af;
  }

  .file-name {
    font-size: 0.85rem;
    color: #a78bfa;
    margin-top: 0.5rem;
    word-break: break-all;
  }

  /* Video preview */
  video {
    width: 100%;
    border-radius: 12px;
    background: #000;
  }

  .preview-label {
    font-size: 0.8rem;
    color: #9ca3af;
    margin-bottom: 0.5rem;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }

  .btn {
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s, opacity 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-merge {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    box-shadow: 0 4px 20px rgba(167,139,250,0.35);
  }

  .btn-download {
    background: linear-gradient(135deg, #34d399, #059669);
    color: #fff;
    box-shadow: 0 4px 20px rgba(52,211,153,0.3);
  }

  .btn-reset {
    background: rgba(255,255,255,0.1);
    color: #e0e0e0;
  }

  /* Progress */
  .progress-wrap {
    display: none;
    margin: 1.5rem 0;
  }

  .progress-wrap.show { display: block; }

  .progress-bar-bg {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    border-radius: 999px;
    transition: width 0.3s;
  }

  .progress-text {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: #9ca3af;
  }

  .error-box {
    display: none;
    margin-top: 1rem;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    color: #fca5a5;
    font-size: 0.85rem;
    line-height: 1.6;
    word-break: break-all;
  }
  .error-box.show { display: block; }
  .error-box strong { display: block; margin-bottom: 0.25rem; color: #f87171; }

  /* Result */
  .result-section {
    display: none;
    margin-top: 1.5rem;
  }

  .result-section.show { display: block; }

  .result-card {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .result-title {
    font-weight: 600;
    margin-bottom: 1rem;
    color: #34d399;
  }

  /* Swap button */
  .swap-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #e0e0e0;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 1.2rem;
    margin: auto;
    transition: background 0.2s;
    align-self: center;
  }

  .swap-btn:hover { background: rgba(167,139,250,0.2); }

  .upload-row-wrap {
    display: flex;
    gap: 1rem;
    align-items: stretch;
    margin-bottom: 1.5rem;
  }

  .upload-row-wrap .upload-card { flex: 1; }

  @media (max-width: 640px) {
    .upload-row-wrap { flex-direction: column; }
    .swap-btn { transform: rotate(90deg); }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<h1>视频拼接工具</h1>
<p class="subtitle">在浏览器中本地合并两个视频，无需上传到服务器</p>

<div class="container">
  <!-- Upload -->
  <div class="upload-row-wrap">
    <div class="upload-card" id="card1">
      <input type="file" accept="video/*" id="input1">
      <div class="upload-icon">&#x1F3AC;</div>
      <div class="upload-label">视频 1（前半段）</div>
      <div class="upload-hint">点击或拖拽上传</div>
      <div class="file-name" id="name1"></div>
      <video id="preview1" controls style="display:none; margin-top:0.75rem"></video>
    </div>

    <button class="swap-btn" id="swapBtn" title="交换顺序">&#x21C4;</button>

    <div class="upload-card" id="card2">
      <input type="file" accept="video/*" id="input2">
      <div class="upload-icon">&#x1F3AC;</div>
      <div class="upload-label">视频 2（后半段）</div>
      <div class="upload-hint">点击或拖拽上传</div>
      <div class="file-name" id="name2"></div>
      <video id="preview2" controls style="display:none; margin-top:0.75rem"></video>
    </div>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn btn-merge" id="mergeBtn" disabled>合并视频</button>
    <button class="btn btn-reset" id="resetBtn">重置</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">正在加载 FFmpeg …</div>
    <div class="error-box" id="errorBox">
      <strong>出错了</strong>
      <span id="errorMsg"></span>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-card">
      <div class="result-title">合并完成</div>
      <video id="resultVideo" controls></video>
      <div class="btn-row" style="margin-top:1rem">
        <button class="btn btn-download" id="downloadBtn">下载合并视频</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// State
let file1 = null, file2 = null;
let mergedBlob = null;

// DOM refs
const input1 = $('input1'), input2 = $('input2');
const preview1 = $('preview1'), preview2 = $('preview2');
const name1 = $('name1'), name2 = $('name2');
const card1 = $('card1'), card2 = $('card2');
const mergeBtn = $('mergeBtn'), resetBtn = $('resetBtn');
const progressWrap = $('progressWrap'), progressBar = $('progressBar'), progressText = $('progressText');
const errorBox = $('errorBox'), errorMsg = $('errorMsg');
const resultSection = $('resultSection'), resultVideo = $('resultVideo'), downloadBtn = $('downloadBtn');

function showError(msg) {
  progressBar.style.width = '0%';
  progressText.textContent = '处理失败';
  errorBox.classList.add('show');
  errorMsg.textContent = msg;
}

function hideError() {
  errorBox.classList.remove('show');
  errorMsg.textContent = '';
}

function updateMergeBtn() {
  mergeBtn.disabled = !(file1 && file2);
}

function handleFile(file, num) {
  if (!file) return;
  const card = num === 1 ? card1 : card2;
  const nameEl = num === 1 ? name1 : name2;
  const videoEl = num === 1 ? preview1 : preview2;

  if (num === 1) file1 = file; else file2 = file;

  card.classList.add('has-file');
  nameEl.textContent = file.name;
  const url = URL.createObjectURL(file);
  videoEl.src = url;
  videoEl.style.display = 'block';
  // hide icon / label / hint
  card.querySelector('.upload-icon').style.display = 'none';
  card.querySelector('.upload-label').style.display = 'none';
  card.querySelector('.upload-hint').style.display = 'none';
  updateMergeBtn();
}

input1.addEventListener('change', e => handleFile(e.target.files[0], 1));
input2.addEventListener('change', e => handleFile(e.target.files[0], 2));

// Drag-and-drop
[card1, card2].forEach((card, i) => {
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('dragover'); });
  card.addEventListener('dragleave', () => card.classList.remove('dragover'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) handleFile(f, i + 1);
  });
});

// Swap
$('swapBtn').addEventListener('click', () => {
  const tmp = file1;
  file1 = file2;
  file2 = tmp;

  // Swap visual state
  [name1.textContent, name2.textContent] = [name2.textContent, name1.textContent];
  [preview1.src, preview2.src] = [preview2.src, preview1.src];
  const d1 = preview1.style.display, d2 = preview2.style.display;
  preview1.style.display = d2;
  preview2.style.display = d1;

  const c1Has = card1.classList.contains('has-file');
  const c2Has = card2.classList.contains('has-file');
  card1.classList.toggle('has-file', c2Has);
  card2.classList.toggle('has-file', c1Has);

  // Swap icons visibility
  const icon1 = card1.querySelector('.upload-icon');
  const icon2 = card2.querySelector('.upload-icon');
  const lbl1 = card1.querySelector('.upload-label');
  const lbl2 = card2.querySelector('.upload-label');
  const hint1 = card1.querySelector('.upload-hint');
  const hint2 = card2.querySelector('.upload-hint');

  [icon1.style.display, icon2.style.display] = [icon2.style.display, icon1.style.display];
  [lbl1.style.display, lbl2.style.display] = [lbl2.style.display, lbl1.style.display];
  [hint1.style.display, hint2.style.display] = [hint2.style.display, hint1.style.display];
});

// Reset
resetBtn.addEventListener('click', () => {
  file1 = file2 = mergedBlob = null;
  [input1, input2].forEach(i => i.value = '');
  [preview1, preview2, resultVideo].forEach(v => { v.src = ''; v.style.display = 'none'; });
  [name1, name2].forEach(n => n.textContent = '');
  [card1, card2].forEach(c => {
    c.classList.remove('has-file');
    c.querySelector('.upload-icon').style.display = '';
    c.querySelector('.upload-label').style.display = '';
    c.querySelector('.upload-hint').style.display = '';
  });
  resultSection.classList.remove('show');
  progressWrap.classList.remove('show');
  progressBar.style.width = '0%';
  hideError();
  updateMergeBtn();
});

// ===== Canvas + MediaRecorder approach (works everywhere, no FFmpeg needed) =====

function getVideoInfo(file) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.muted = true;
    video.preload = 'metadata';
    video.onloadedmetadata = () => resolve({
      video,
      width: video.videoWidth,
      height: video.videoHeight,
      duration: video.duration,
    });
    video.onerror = () => reject(new Error('无法读取视频: ' + file.name));
    video.src = URL.createObjectURL(file);
  });
}

function playVideoToEnd(video) {
  return new Promise((resolve) => {
    video.onended = resolve;
    video.play();
  });
}

async function mergeWithCanvas(f1, f2, onProgress) {
  onProgress('正在分析视频…', 5);

  const info1 = await getVideoInfo(f1);
  const info2 = await getVideoInfo(f2);

  // Use the larger resolution
  const W = Math.max(info1.width, info2.width, 640);
  const H = Math.max(info1.height, info2.height, 360);
  const totalDuration = info1.duration + info2.duration;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Set up MediaRecorder
  const stream = canvas.captureStream(30);

  // Try to capture audio from videos
  const audioCtx = new AudioContext();
  const dest = audioCtx.createMediaStreamDestination();
  // Combine audio track into stream
  dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus'
    : MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
      ? 'video/webm;codecs=vp8,opus'
      : 'video/webm';

  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

  const recordingStopped = new Promise(resolve => { recorder.onstop = resolve; });

  // Draw function
  function drawFrame(video) {
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.min(W / vw, H / vh);
    const dw = vw * scale, dh = vh * scale;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(video, (W - dw) / 2, (H - dh) / 2, dw, dh);
  }

  // Play and record each video sequentially
  async function recordVideo(video, audioSource, startPct) {
    // Connect audio
    let source;
    try {
      source = audioCtx.createMediaElementSource(video);
      source.connect(dest);
      source.connect(audioCtx.destination); // also hear it? No, mute playback
    } catch (_) {}

    video.muted = false;
    video.currentTime = 0;

    // Start animation loop
    let stopped = false;
    function render() {
      if (stopped) return;
      drawFrame(video);
      const elapsed = video.currentTime;
      const pct = startPct + (elapsed / totalDuration) * 90;
      onProgress(`正在录制… ${Math.round(pct)}%`, pct);
      requestAnimationFrame(render);
    }
    render();

    await playVideoToEnd(video);
    stopped = true;

    if (source) {
      try { source.disconnect(); } catch (_) {}
    }
  }

  recorder.start(100);
  onProgress('正在录制第 1 个视频…', 10);

  // Video 1
  info1.video.muted = false;
  await recordVideo(info1.video, null, 5);

  // Video 2
  onProgress('正在录制第 2 个视频…', 50);
  await recordVideo(info2.video, null, 50);

  recorder.stop();
  onProgress('正在生成文件…', 95);
  await recordingStopped;

  // Cleanup
  URL.revokeObjectURL(info1.video.src);
  URL.revokeObjectURL(info2.video.src);
  try { audioCtx.close(); } catch (_) {}

  return new Blob(chunks, { type: mimeType });
}

// Merge
mergeBtn.addEventListener('click', async () => {
  if (!file1 || !file2) return;
  mergeBtn.disabled = true;
  resultSection.classList.remove('show');
  hideError();

  progressWrap.classList.add('show');

  try {
    mergedBlob = await mergeWithCanvas(file1, file2, (msg, pct) => {
      progressText.textContent = msg;
      progressBar.style.width = pct + '%';
    });

    const url = URL.createObjectURL(mergedBlob);
    resultVideo.src = url;
    resultVideo.style.display = '';
    resultSection.classList.add('show');

    progressBar.style.width = '100%';
    progressText.textContent = '拼接完成！';
  } catch (err) {
    console.error(err);
    showError(err.message || String(err));
  } finally {
    mergeBtn.disabled = false;
    updateMergeBtn();
  }
});

// Download
downloadBtn.addEventListener('click', () => {
  if (!mergedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(mergedBlob);
  a.download = 'merged_video.webm';
  a.click();
});
</script>

</body>
</html>
